# Docker Compose — configuration production TomatoScan
#
# Déploiement Coolify sur VPS OVH :
#   push sur develop → Coolify charge ce fichier + docker-compose.override.yml (préprod SQLite)
#   push sur main    → Coolify charge ce fichier seul (prod PostgreSQL)
#
# Prérequis avant le premier déploiement :
#   1. Copier .env.example en .env et remplir toutes les valeurs
#   2. Déposer best_model.pt dans le volume Docker models/ sur le VPS
#      (copie SSH directe — le .pt n'est jamais dans l'image Docker)
#   3. Configurer les secrets GitHub : SECRET_KEY, ADMIN_USERNAME, ADMIN_PASSWORD

services:

  # ─── API FastAPI ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    # Toutes les variables d'environnement chargées depuis .env (jamais de valeurs en dur ici)
    env_file:
      - .env
    volumes:
      # Modèle MobileNetV2 monté en lecture seule — trop volumineux pour être dans l'image
      # Le fichier .pt est déposé manuellement sur le VPS via un script SSH
      - ./models:/app/models:ro
    networks:
      - coolify
    healthcheck:
      # Vérifie que l'API répond sur /health avant de démarrer le frontend
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Frontend Streamlit ───────────────────────────────────────────────────────
  front:
    build:
      context: .
      dockerfile: Dockerfile.front
    restart: unless-stopped
    # Le frontend démarre uniquement quand l'API est opérationnelle (healthcheck OK)
    depends_on:
      api:
        condition: service_healthy
    networks:
      - coolify

  # ─── Base de données PostgreSQL 16 (production uniquement) ───────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      # Variables lues depuis .env — ne jamais écrire les credentials en dur ici
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Volume nommé pour persister les données entre les redémarrages du conteneur
      - postgres_donnees:/var/lib/postgresql/data
    healthcheck:
      # pg_isready vérifie que PostgreSQL accepte les connexions
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - coolify

  # ─── Prometheus — collecte les métriques exposées sur /metrics ──────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      # Rétention des données sur 30 jours — évite une croissance illimitée du volume
      - '--storage.tsdb.retention.time=30d'
    volumes:
      # Configuration du scrape — cible l'API sur le réseau coolify
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - coolify

  # ─── Grafana — visualisation des métriques Prometheus ───────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      # Mot de passe admin Grafana — défini dans .env, jamais en dur ici
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      # Volume persistant pour les dashboards et plugins Grafana
      - grafana_data:/var/lib/grafana
      # Provisioning automatique : datasources, dashboards, alertes
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      # Fichiers JSON des dashboards chargés au démarrage
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - coolify

volumes:
  # Volume nommé PostgreSQL — survit aux arrêts et suppressions de conteneur
  postgres_donnees:
  # Volume nommé Grafana — conserve les dashboards et préférences utilisateur
  grafana_data:

networks:
  coolify:
    external: true
