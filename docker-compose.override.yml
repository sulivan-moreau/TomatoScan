# Docker Compose override — environnement préprod / développement local
#
# Chargé automatiquement par "docker compose up" (pas besoin de -f).
# Remplace la configuration PostgreSQL de docker-compose.yml par SQLite local.
#
# Différences avec la production :
#   - SQLite fichier local (pas de service postgres)
#   - APP_ENV=development (logs plus verbeux, rechargement automatique uvicorn)
#
# Pour lancer en mode production uniquement (PostgreSQL, ignorer ce fichier) :
#   docker compose -f docker-compose.yml up

services:

  # ─── Override de l'API : SQLite à la place de PostgreSQL ─────────────────────
  api:
    environment:
      # Remplace DATABASE_URL définie dans .env → SQLite local, pas de service postgres requis
      DATABASE_URL: sqlite:///./tomatoscan_preprod.db
      # Signale à l'application qu'elle tourne en mode développement (APP_ENV lu par main.py)
      APP_ENV: development

  # ─── PostgreSQL désactivé en préprod ─────────────────────────────────────────
  # Le profil "production_only" empêche le démarrage automatique du service.
  # "docker compose up" ne démarrera pas postgres, l'API utilisera SQLite.
  postgres:
    profiles:
      - production_only
